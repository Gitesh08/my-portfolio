<div class="modal-backdrop" [class.open]="isOpen" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <button class="close-btn" (click)="closeModal()" aria-label="Close modal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div class="modal-body" *ngIf="project">
            <div class="modal-image-placeholder">
                <!-- Project image placeholder -->
                <span class="placeholder-text">{{ project.title }} Preview</span>
            </div>

            <div class="modal-details">
                <h2 class="modal-title">{{ project.title }}</h2>
                <div class="modal-tags">
                    <span class="badge" *ngFor="let tag of project.tags">{{ tag }}</span>
                </div>

                <p class="modal-description">{{ project.description }}</p>

                <div class="modal-actions">
                    <button class="btn-pill primary">View Case Study</button>
                    <button class="btn-pill">Visit Live Site</button>
                </div>
            </div>
        </div>
    </div>
</div>
