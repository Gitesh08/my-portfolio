<section class="home-projects-section">
    <div class="container">
        <div class="section-header fade-up" appScrollAnimate>
            <h2 class="section-title">CATALOG PREVIEW</h2>
            <a routerLink="/catalogs" class="btn-pill">
                See More
                <span class="icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </span>
            </a>
        </div>
        
        <!-- Uniform Grid for Home Preview -->
        <div class="projects-grid fade-up delay-200" appScrollAnimate>
            <div *ngFor="let item of catalogs; let i = index"
                class="project-card" 
                (click)="openLightbox(i)" tabindex="0" (keydown.enter)="openLightbox(i)">
                
                <img [src]="item.imageUrl" [alt]="item.title" loading="lazy" class="project-bg-image">
                <div class="project-card-gradient"></div>
                
                <div class="project-overlay">
                    <span class="view-text">View Image</span>
                </div>
                
                <div class="project-info">
                    <h3 class="project-title">{{ item.title }}</h3>
                    <span class="project-tag">{{ item.category }}</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Full-screen Lightbox overlay -->
<div class="lightbox-overlay" [class.open]="lightboxOpen()" (click)="closeLightbox()">
    
    <button class="lightbox-close" aria-label="Close Lightbox" (click)="closeLightbox()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>

    <button class="lightbox-nav prev" *ngIf="catalogs.length > 1" (click)="prevImage($event)" aria-label="Previous image">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>

    <div class="lightbox-content" (click)="$event.stopPropagation()">
        <ng-container *ngIf="catalogs.length > 0">
            <img [src]="catalogs[activeImageIndex()].imageUrl" [alt]="catalogs[activeImageIndex()].title" class="lightbox-img">
            <div class="lightbox-caption">
                <h4>{{ catalogs[activeImageIndex()].title }}</h4>
                <p>{{ catalogs[activeImageIndex()].category }}</p>
            </div>
        </ng-container>
    </div>

    <button class="lightbox-nav next" *ngIf="catalogs.length > 1" (click)="nextImage($event)" aria-label="Next image">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>
</div>
