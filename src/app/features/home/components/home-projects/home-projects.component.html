<section class="home-projects-section">
    <div class="container">
        <div class="section-header fade-up" appScrollAnimate>
            <h2 class="section-title">FEATURED WORK</h2>
            <a routerLink="/projects" class="btn-pill">
                See More
                <span class="icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </span>
            </a>
        </div>
        <div class="projects-grid">
            <div *ngFor="let project of projects; let i = index"
                class="project-card fade-up delay-{{ (i % 2 + 1) * 100 }}" appScrollAnimate
                [ngStyle]="{'background-image': project.imageUrl ? 'url(' + project.imageUrl + ')' : 'var(--bg-surface)'}"
                (click)="openProject(project)" tabindex="0" (keydown.enter)="openProject(project)">
                <div class="project-overlay">
                    <span class="view-text">View All</span>
                </div>
                <div class="project-info">
                    <h3 class="project-title">{{ project.title }}</h3>
                    <span class="project-tag">{{ project.tags[0] }}</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Project Modal -->
<app-project-modal [project]="selectedProject()" [isOpen]="isModalOpen()" (close)="closeModal()">
</app-project-modal>
