<section class="home-projects-section">
    <div class="container">
        <div class="section-header fade-up" appScrollAnimate>
            <h2 class="section-title">LATEST WRITING</h2>
            <a routerLink="/blogs" class="btn-pill">
                See More
                <span class="icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </span>
            </a>
        </div>
        <div class="projects-grid">
            <!-- Skeleton Loader -->
            <ng-container *ngIf="isLoading">
                <div *ngFor="let i of [1, 2]" class="project-card skeleton-card">
                    <div class="skeleton-thumbnail"></div>
                    <div class="project-info">
                        <div class="skeleton-title"></div>
                        <div class="blog-meta flex-gap">
                            <div class="skeleton-tag"></div>
                            <div class="skeleton-tag date-tag"></div>
                        </div>
                    </div>
                </div>
            </ng-container>

            <!-- Actual Blog Content -->
            <ng-container *ngIf="!isLoading">
                <div *ngFor="let blog of blogs; let i = index" class="project-card fade-up delay-{{ (i % 2 + 1) * 100 }}"
                    appScrollAnimate (click)="openBlog(blog.url)" tabindex="0" (keydown.enter)="openBlog(blog.url)">
                    <img *ngIf="blog.thumbnail" [src]="blog.thumbnail" [alt]="blog.title" class="blog-thumbnail"
                        loading="lazy">

                    <div class="project-overlay">
                        <span class="view-text">Read Story</span>
                    </div>
                    <div class="project-info">
                        <h3 class="project-title">{{ blog.title }}</h3>
                        <div class="blog-meta flex-gap">
                            <span class="project-tag">{{ blog.tags[0] }}</span>
                            <span class="project-tag date-tag" *ngIf="blog.pubDate">{{ blog.pubDate }}</span>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>
</section>
