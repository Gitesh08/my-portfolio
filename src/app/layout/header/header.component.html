<header class="header">
  <div class="header-container">
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="btn-pill fade-up"
        appScrollAnimate>
        <span class="icon active-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </span>
        <span class="nav-label"><span class="desktop-text">Home</span><span class="mobile-text">Home</span></span>
      </a>

      <a routerLink="/projects" routerLinkActive="active" class="btn-pill fade-up" appScrollAnimate>
        <span class="icon active-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </span>
        <span class="nav-label"><span class="desktop-text">See my work</span><span class="mobile-text">Work</span></span>
      </a>

      <a routerLink="/blogs" routerLinkActive="active" class="btn-pill fade-up delay-150" appScrollAnimate>
        <span class="icon active-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
        </span>
        <span class="nav-label"><span class="desktop-text">My blogs</span><span class="mobile-text">Blogs</span></span>
      </a>

      <a href="#contact" class="btn-pill fade-up delay-200" appScrollAnimate>
        <span class="icon active-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22 6 12 13 2 6"></polyline>
          </svg>
        </span>
        <span class="nav-label"><span class="desktop-text">Let's talk</span><span class="mobile-text">Contact</span></span>
      </a>
    </nav>
  </div>
</header>
